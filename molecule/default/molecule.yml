---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: oraclelinux
    image: oraclelinux:8
    pre_build_image: true
  - name: ubuntu
    image: ubuntu:latest
    pre_build_image: true
provisioner:
  name: ansible
  host_vars:
    ubuntu:
      ansible_python_interpreter: /usr/bin/python3
      ansible_connection: docker
verifier:
  name: ansible
