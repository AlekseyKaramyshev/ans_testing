---
- name: Prepare
  hosts: all
  gather_facts: no
  tasks:
    - name: Install Python and deps (auto-detect)
      raw: |
        if command -v apt-get >/dev/null; then
          apt-get update && apt-get install -y python3 python3-pip sudo curl
        elif command -v dnf >/dev/null; then
          dnf makecache && dnf install -y python3 python3-pip sudo curl
        fi
      changed_when: false
